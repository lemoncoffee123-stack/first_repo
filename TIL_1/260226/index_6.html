<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
  </style>
</head>
<body>
  <div class="card border border-0" style="width: 30rem;">
    <div class="card-header bg-white">
      <div class="alert bg-danger text-white" role="alert">
        Invalid Login or password
      </div>
      <h2 class="fw-bold text-center">SSAFY 전용 Gitlab 시스템</h2>
    </div>
    <ul class="list-group list-group-flush">
      <li class="list-group-item">
        <div class="card m-1" style="width: auto;">
          <div class="card-header text-center bg-white border-bottom border-2 border-primary fw-bold">
            Sign in
          </div>
          <ul class="list-group list-group-flush">
            <li class="list-group-item">

              <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label fw-bold">Username or Email</label>
                <input type="email" class="form-control" id="exampleFormControlInput1">
              </div>

              <label for="inputPassword5" class="form-label fw-bold">Password</label>
                <input type="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock">
                <div id="passwordHelpBlock" class="form-text">

                  <div class="m-0 my-2 fs-6 d-flex align-items-center">
                    <input type="checkbox" class="form-check-input mb-1 ml-0" id="btncheck">
                    <label class="form-check-label ms-2 me-auto" for="btncheck">Remember me</label>

                    <a class="text-end" href="#">Forgot your password?</a>
                  </div>
                </div>

                <div class="d-grid gap-2 my-3">
                  <button class="btn bg-success text-white" type="button">Sign in</button>
                </div>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </div>










  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
